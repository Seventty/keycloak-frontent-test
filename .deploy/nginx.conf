server {
	listen 80;
	server_name localhost;

	location = / {
    return 302 $scheme://$http_host/login;
  }

    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }

    location /api/ {
      proxy_pass http://backend:8082/api/;
    }
}
