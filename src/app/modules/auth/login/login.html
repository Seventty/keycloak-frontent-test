<div class="min-h-screen flex items-center justify-center bg-slate-900">

      <div class="w-full max-w-md bg-white/10 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-white/20">

        <h2 class="text-3xl font-bold text-white text-center mb-6">
          Iniciar Sesión
        </h2>

        <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

          <div>
            <input
              type="text"
              formControlName="user"
              placeholder="username"
              class="input"
            />

          </div>

          <div>
            <input
              type="password"
              formControlName="password"
              placeholder="Password"
              class="input"
            />
            @if (form.controls.password.invalid && form.controls.password.touched) {
              <p class="error">Password requerido</p>
            }
          </div>

          <button
            type="submit"
            [disabled]="form.invalid || loading()"
            class="btn-primary">

            @if (loading()) {
              <span>Entrando...</span>
            } @else {
              <span>Entrar</span>
            }

          </button>

          <p class="text-center text-sm text-slate-400">
            ¿No tienes cuenta?
            <a routerLink="/register" class="text-blue-400">
              Regístrate
            </a>
          </p>

          @if (error()) {
            <p class="text-red-400 text-sm text-center mt-3">
              {{ error() }}
            </p>
          }

        </form>
      </div>
    </div>
