<div class="min-h-screen flex items-center justify-center bg-indigo-900">

  <div class="w-full max-w-md bg-white/10 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-white/20">

    <h2 class="text-3xl font-bold text-white text-center mb-6">
      Crear Cuenta
    </h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

      <input type="text" formControlName="name" placeholder="Nombre completo" class="input" />
      <input type="email" formControlName="email" placeholder="Email" class="input" />
      <input type="password" formControlName="password" placeholder="Password" class="input" />

      <button type="submit" [disabled]="form.invalid || loading()" class="btn-primary">

        @if (loading()) {
        Registrando...
        } @else {
        Registrarse
        }

      </button>

      @if (error()) {
      <p class="text-red-400 text-sm text-center">
        {{ error() }}
      </p>
      }

    </form>

  </div>
</div>
